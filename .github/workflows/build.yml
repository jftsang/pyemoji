name: Build and Test

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        pip install pytest-github-actions-annotate-failures
    
    - name: Run tests
      run: |
        pytest --tb=short || echo "Tests completed with failures"

    - name: Run linter
      run: |
        ruff check --output-format=github || echo "Linter completed with warnings"

    - name: Run type checks
      run: |
        ty check --output-format=github || echo "Type checking completed with warnings"
