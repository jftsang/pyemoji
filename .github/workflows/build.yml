name: Build and Test

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    
    - name: Run tests
      run: |
        pytest

    - name: Run ruff format and commit
      run: |
        # Get changed Python files
        CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | grep '\.py$' || true)
        if [[ -n "$CHANGED_FILES" ]]; then
          echo "Formatting changed Python files:"
          echo "$CHANGED_FILES"
          ruff format $CHANGED_FILES
          if [[ -n $(git status --porcelain) ]]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add $CHANGED_FILES
            git commit -m "Auto-format changed Python files with ruff"
            git push
          fi
        else
          echo "No Python files changed, skipping formatting"
        fi

    - name: Run linter
      run: |
        ruff check --output-format=github || echo "Linter completed with warnings"

    - name: Run type checks
      run: |
        ty check --output-format=github || echo "Type checking completed with warnings"
